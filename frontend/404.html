<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · ashmija in color</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(180deg, #f3eee8 0%, #fff9f3 100%);
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: '';
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.35;
      pointer-events: none;
    }
    body::before {
      width: 280px;
      height: 280px;
      background: rgba(184, 147, 58, 0.2);
      top: -80px;
      left: -90px;
    }
    body::after {
      width: 320px;
      height: 320px;
      background: rgba(75, 111, 92, 0.14);
      bottom: -110px;
      right: -120px;
      animation-duration: 10s;
    }
    .error-card {
      position: relative;
      max-width: 700px;
      width: 100%;
      padding: 3rem 2.5rem;
      border-radius: 32px;
      box-shadow: 0 22px 60px rgba(38, 33, 22, 0.12);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(184, 147, 58, 0.14);
      backdrop-filter: blur(8px);
      transform-style: preserve-3d;
      overflow: hidden;
    }
    .error-card::before {
      content: '';
      position: absolute;
      inset: 1rem;
      border-radius: 24px;
      border: 1px solid rgba(184, 147, 58, 0.12);
      pointer-events: none;
    }
    .error-code {
      position: relative;
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 8vw, 8rem);
      color: #2b1f14;
      margin: 0;
      letter-spacing: 0.04em;
      text-shadow: 0 0 0 rgba(184, 147, 58, 0.2);
    }
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: transparent;
      text-shadow:
        0 0 0 rgba(184,147,58,0.3),
        -2px -2px 0 rgba(255,255,255,0.5),
        2px 2px 18px rgba(184,147,58,0.18);
      mix-blend-mode: screen;
    }
    .error-title {
      margin: 0.75rem 0 1.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #3b3028;
      line-height: 1.05;
    }
    .error-copy {
      font-size: 1rem;
      line-height: 1.8;
      color: #5a4e43;
      margin-bottom: 2rem;
    }
    .error-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 0.95rem 1.5rem;
      border-radius: 999px;
      background: #b8933a;
      color: #1c1a17;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .error-actions a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(184, 147, 58, 0.24);
    }
    .botanical-graphic {
      margin-top: 1.2rem;
      display: grid;
      place-items: center;
      color: #8d7c65;
      opacity: 0.8;
    }
    .botanical-graphic svg {
      width: 180px;
      height: auto;
      opacity: 0.76;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(24px, -18px, 0); }
    }
  </style>
</head>
<body>
  <main class="error-card">
    <h1 class="error-code">404</h1>
    <p class="error-copy">This wall is waiting for art, but the page you requested doesn’t exist. Let’s bring you back to the studio where the next piece is ready to be discovered.</p>
    <div class="error-actions">
      <a href="index.html">Return to Home</a>
    </div>
  </main>
</body>
</html>
